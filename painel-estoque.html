<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel de Estoque — Fraga Bike Shop</title>
<style>
  :root {
    /* azul premium: navy profundo + azul vibrante, no espírito do visual original */
    --bg: #0b1220;
    --bg-panel: #111a2e;
    --bg-raised: #16213a;
    --ink: #e6ebf5;
    --ink-dim: #8a97b3;
    --ink-faint: #5c6a8a;
    --line: #1f2c47;
    --line-strong: #2a3a5c;

    --blue: #3b82f6;
    --blue-dark: #1e40af;
    --blue-bg: rgba(59, 130, 246, 0.14);
    --warn: #fbbf24;
    --warn-bg: rgba(251, 191, 36, 0.14);
    --ok: #34d399;
    --ok-bg: rgba(52, 211, 153, 0.13);
    --alert: #f87171;
    --alert-bg: rgba(248, 113, 113, 0.13);

    --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
    --font-mono: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(59,130,246,0.12), transparent 60%),
      var(--bg);
    margin: 0;
    padding: 48px 24px 64px;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 980px; margin: 0 auto; }

  a, button, input { font-family: inherit; }

  :focus-visible {
    outline: 2px solid var(--warn);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ===== entrada escalonada ===== */
  .rise {
    opacity: 0;
    transform: translateY(10px);
    animation: rise .6s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .001ms !important;
    }
  }

  /* ===== header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }

  .badge {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700; font-size: 14px; color: #fff;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 19px;
    margin: 0;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--ink-dim);
    font-family: var(--font-body);
    font-size: 13px;
    margin-top: 2px;
  }

  .badge-live {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--bg-panel);
    border: 1px solid var(--line-strong);
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--ink-dim);
  }
  .badge-live .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 3px var(--ok-bg);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }

  /* ===== hero: gauge + specs ===== */
  .hero {
    display: flex;
    align-items: center;
    gap: 40px;
    padding: 28px 32px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 10px 30px -14px rgba(0,0,0,0.45);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .gauge-wrap { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
  .gauge-wrap svg { width: 100%; height: 100%; }
  .gauge-progress {
    transition: stroke-dashoffset 1.2s cubic-bezier(.16,1,.3,1), stroke 0.4s;
  }
  .gauge-readout {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .gauge-readout .pct {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .gauge-readout .pct .unit { font-size: 15px; font-weight: 500; color: var(--ink-dim); }
  .gauge-readout .lbl {
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 5px;
  }

  .specs { flex: 1; min-width: 220px; display: flex; flex-direction: column; gap: 0; }
  .spec-row {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .spec-row:last-child { border-bottom: none; }
  .spec-row .k {
    font-size: 13px;
    color: var(--ink-dim);
  }
  .spec-row .v {
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.01em;
  }
  .spec-row.spec-ok .v { color: var(--ok); }
  .spec-row.spec-alert .v { color: var(--alert); }

  .updated-at {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  /* ===== section header ===== */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .section-title {
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .count-chip {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-dim);
    background: var(--bg-panel);
    border: 1px solid var(--line-strong);
    padding: 1px 8px;
    border-radius: 999px;
  }

  .export-buttons { display: flex; gap: 8px; }
  .btn-export {
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: var(--bg-panel);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  .btn-export:hover { background: var(--bg-raised); border-color: var(--line-strong); }
  .btn-export.primary {
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.28);
  }
  .btn-export.primary:hover { opacity: 0.92; }

  /* ===== tabela de divergências ===== */
  .table-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 10px 30px -18px rgba(0,0,0,0.45);
  }
  table { width: 100%; border-collapse: collapse; min-width: 560px; }
  th, td { text-align: left; padding: 13px 18px; font-size: 13.5px; }
  th {
    font-weight: 600;
    color: var(--ink-dim);
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--line);
    background: var(--bg-raised);
  }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg-raised); }
  td.sku { font-weight: 700; color: var(--ink); }
  td.produto {
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--ink-dim);
  }
  td.num { color: var(--ink-dim); }
  .diff-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--alert-bg);
    color: var(--alert);
    font-weight: 700;
    font-size: 12px;
  }

  /* ===== estado vazio ===== */
  .empty-state {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 40px 20px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    color: var(--ok);
    font-size: 14px;
    font-weight: 600;
  }
  .empty-state svg { flex-shrink: 0; }

  .loading-state, .error-state {
    padding: 32px 20px;
    text-align: center;
    font-size: 13.5px;
    color: var(--ink-dim);
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
  }
  .error-state { color: var(--alert); border-color: rgba(248,113,113,0.3); background: var(--alert-bg); text-align: left; }
  .error-state .detail { display: block; margin-top: 8px; font-size: 12px; color: var(--ink-faint); }

  /* ===== SKUs sem correspondência (details) ===== */
  .advisory {
    margin-top: 18px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    border-radius: 12px;
  }
  .advisory summary {
    cursor: pointer;
    padding: 13px 16px;
    font-size: 13px;
    color: var(--ink-dim);
    list-style: none;
    display: flex; align-items: center; gap: 9px;
  }
  .advisory summary::-webkit-details-marker { display: none; }
  .advisory summary::before {
    content: '+';
    color: var(--warn);
    font-weight: 700;
    width: 12px;
  }
  .advisory[open] summary::before { content: '–'; }
  .advisory .chip-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 16px 16px;
  }
  .chip {
    font-size: 12px;
    color: var(--ink-dim);
    background: var(--bg-raised);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    padding: 3px 10px;
  }

  /* ===== carregar outra fonte ===== */
  .load-strip {
    margin-top: 32px;
    padding: 16px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .load-strip .lbl {
    display: block;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  .load-row { display: flex; gap: 8px; }
  .load-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    color: var(--ink);
    font-size: 13px;
    outline: none;
  }
  .load-row input::placeholder { color: var(--ink-faint); }
  .load-row input:focus { border-color: var(--blue); }
  .load-row button {
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: var(--bg-raised);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .load-row button:hover { border-color: var(--blue); }

  footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-faint);
  }

  @media (max-width: 560px) {
    body { padding: 28px 16px 48px; }
    .hero { gap: 24px; padding: 24px 20px; }
    td.produto { max-width: 160px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header rise">
    <div class="header-left">
      <div class="badge">FB</div>
      <div>
        <h1>Painel de Estoque</h1>
        <div class="subtitle">Fraga Bike Shop · Bling × Mercado Livre</div>
      </div>
    </div>
    <div class="badge-live"><span class="dot"></span> Confere a cada hora</div>
  </div>

  <div id="conteudo"></div>

  <div class="load-strip rise" style="animation-delay:.3s">
    <span class="lbl">Carregar outra fonte</span>
    <div class="load-row">
      <input id="dataUrl" type="text" placeholder="URL do resultado-verificacao.json" />
      <button onclick="carregar()">Carregar</button>
    </div>
  </div>

  <footer>Painel interno · dados do último resultado gerado pelo verificador automático</footer>
</div>

<script>
  // Por padrão, lê o resultado-verificacao.json do mesmo repositório/pasta
  // (é isso que o GitHub Actions atualiza a cada hora). Cole outra URL no
  // campo acima só se quiser apontar pra um arquivo em outro lugar.
  let urlSalva = 'resultado-verificacao.json';

  const GAUGE_R = 50;
  const GAUGE_C = 2 * Math.PI * GAUGE_R;

  async function carregar() {
    const input = document.getElementById('dataUrl');
    const url = input.value.trim() || urlSalva;
    urlSalva = url;
    renderCarregando();

    try {
      const resp = await fetch(url, { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const dados = await resp.json();
      renderPainel(dados);
    } catch (err) {
      renderErro('Não foi possível carregar os dados. Confira a URL, se o bucket/arquivo permite leitura pública e se o CORS está habilitado.', err.message);
    }
  }

  function renderCarregando() {
    document.getElementById('conteudo').innerHTML = '<div class="loading-state">Carregando…</div>';
  }

  function renderErro(msg, detalhe) {
    document.getElementById('conteudo').innerHTML =
      '<div class="error-state">' + escapeHtml(msg) + (detalhe ? '<span class="detail">' + escapeHtml(detalhe) + '</span>' : '') + '</div>';
  }

  function escapeHtml(texto) {
    const div = document.createElement('div');
    div.textContent = texto ?? '';
    return div.innerHTML;
  }

  function formatarData(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
  }

  function gaugeSvg(pct) {
    const cor = pct >= 98 ? 'var(--ok)' : pct >= 90 ? 'var(--blue)' : 'var(--alert)';
    return `
      <svg viewBox="0 0 120 120" role="img" aria-label="${pct}% dos SKUs em dia">
        <circle cx="60" cy="60" r="${GAUGE_R}" fill="none" stroke="var(--line)" stroke-width="9"/>
        <circle class="gauge-progress" cx="60" cy="60" r="${GAUGE_R}" fill="none" stroke="${cor}"
          stroke-width="9" stroke-linecap="round" stroke-dasharray="${GAUGE_C}"
          stroke-dashoffset="${GAUGE_C}" transform="rotate(-90 60 60)"/>
      </svg>`;
  }

  function renderPainel(dados) {
    const { atualizadoEm, totalSkus, corretos, totalDivergentes, divergencias, semSkuNoBling } = dados;
    const total = totalSkus ?? 0;
    const ok = corretos ?? 0;
    const pct = total > 0 ? Math.round((ok / total) * 100) : 0;
    const divs = divergencias || [];
    const semBling = semSkuNoBling || [];

    window._divergenciasAtuais = divs;

    let html = '';

    html += '<div class="hero rise">';
    html += '  <div class="gauge-wrap">' + gaugeSvg(pct) +
            '    <div class="gauge-readout"><div class="pct">' + pct + '<span class="unit">%</span></div><div class="lbl">Em dia</div></div>' +
            '  </div>';
    html += '  <div class="specs">';
    html += '    <div class="spec-row"><span class="k">Total de SKUs verificados</span><span class="v">' + (totalSkus ?? '—') + '</span></div>';
    html += '    <div class="spec-row spec-ok"><span class="k">Corretos</span><span class="v">' + (corretos ?? '—') + '</span></div>';
    html += '    <div class="spec-row spec-alert"><span class="k">Divergentes</span><span class="v">' + (totalDivergentes ?? 0) + '</span></div>';
    html += '    <div class="updated-at">Última verificação: ' + formatarData(atualizadoEm) + '</div>';
    html += '  </div>';
    html += '</div>';

    html += '<div class="section-header rise" style="animation-delay:.08s">';
    html += '  <div class="section-title">Divergências <span class="count-chip">' + divs.length + '</span></div>';
    if (divs.length > 0) {
      html += '  <div class="export-buttons">';
      html += '    <button class="btn-export primary" onclick="exportarCSV()">Baixar CSV</button>';
      html += '    <button class="btn-export secondary" onclick="copiarLista()">Copiar lista</button>';
      html += '  </div>';
    }
    html += '</div>';

    if (divs.length > 0) {
      html += '<div class="table-scroll rise" style="animation-delay:.14s"><table><thead><tr>' +
        '<th>SKU</th><th>Produto</th><th class="num">Bling</th><th class="num">ML</th><th class="num">Diferença</th>' +
        '</tr></thead><tbody>';
      divs
        .slice()
        .sort((a, b) => b.diferenca - a.diferenca)
        .forEach((d) => {
          html += '<tr>' +
            '<td class="sku">' + escapeHtml(d.sku) + '</td>' +
            '<td class="produto" title="' + escapeHtml(d.nome) + '">' + escapeHtml(d.nome || '—') + '</td>' +
            '<td class="num">' + d.qtdBling + '</td>' +
            '<td class="num">' + d.qtdML + '</td>' +
            '<td class="num"><span class="diff-badge">Δ' + d.diferenca + '</span></td>' +
            '</tr>';
        });
      html += '</tbody></table></div>';
    } else {
      html += '<div class="empty-state rise" style="animation-delay:.14s">' +
        '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M6 10.5l2.5 2.5L14 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        'Estoque em dia — nenhuma divergência encontrada</div>';
    }

    if (semBling.length > 0) {
      html += '<details class="advisory rise" style="animation-delay:.2s">';
      html += '  <summary>' + semBling.length + ' SKU(s) do Mercado Livre sem código correspondente no Bling</summary>';
      html += '  <div class="chip-list">' + semBling.map((s) => '<span class="chip">' + escapeHtml(s) + '</span>').join('') + '</div>';
      html += '</details>';
    }

    document.getElementById('conteudo').innerHTML = html;

    // dispara a animação do medidor depois que o SVG já está no DOM
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const prog = document.querySelector('.gauge-progress');
        if (prog) prog.style.strokeDashoffset = GAUGE_C * (1 - pct / 100);
      });
    });
  }

  function exportarCSV() {
    const lista = window._divergenciasAtuais || [];
    if (lista.length === 0) return;

    let csv = 'SKU;Produto;Estoque Bling;Estoque ML;Diferenca\n';
    lista
      .slice()
      .sort((a, b) => b.diferenca - a.diferenca)
      .forEach((d) => {
        csv += d.sku + ';' + (d.nome || '').replace(/;/g, ',') + ';' + d.qtdBling + ';' + d.qtdML + ';' + d.diferenca + '\n';
      });

    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const hoje = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = 'produtos-para-arrumar-' + hoje + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function copiarLista() {
    const lista = window._divergenciasAtuais || [];
    if (lista.length === 0) return;

    let texto = 'Produtos para arrumar (' + lista.length + '):\n\n';
    lista
      .slice()
      .sort((a, b) => b.diferenca - a.diferenca)
      .forEach((d) => {
        texto += 'SKU ' + d.sku + ' (' + (d.nome || 'sem nome') + '): Bling ' + d.qtdBling + ' | ML ' + d.qtdML + ' | diferenca ' + d.diferenca + '\n';
      });

    navigator.clipboard.writeText(texto).then(() => {
      const btn = document.querySelector('.btn-export.secondary');
      if (btn) {
        const original = btn.textContent;
        btn.textContent = 'Copiado!';
        setTimeout(() => { btn.textContent = original; }, 1500);
      }
    }).catch(() => {
      alert('Não foi possível copiar automaticamente. Copie manualmente a lista da tabela.');
    });
  }

  carregar();
</script>
</body>
</html>
