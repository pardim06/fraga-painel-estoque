name: Verificar estoque Bling x Mercado Livre

on:
  schedule:
    - cron: '*/5 * * * *' # a cada 5 minutos (minimo pratico do GitHub Actions)
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

permissions:
  contents: write

# Compartilhada com o workflow de perguntas: os dois giram o ML_REFRESH_TOKEN,
# então nunca podem rodar ao mesmo tempo (senão um invalida o token que o
# outro acabou de pegar). cancel-in-progress: false pra sempre esperar a vez
# em vez de cancelar uma execução no meio.
concurrency:
  group: ml-bling-token
  cancel-in-progress: false

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm run verificar
        env:
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          BLING_DEPOSITO_ID: ${{ secrets.BLING_DEPOSITO_ID }}
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          ZAPI_INSTANCE_URL: ${{ secrets.ZAPI_INSTANCE_URL }}
          WHATSAPP_DESTINO: ${{ secrets.WHATSAPP_DESTINO }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Commitar resultado atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultado-verificacao.json
          git diff --quiet --cached || git commit -m "chore: atualiza resultado da verificacao de estoque"
          git pull --rebase
          git push
